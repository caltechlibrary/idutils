site_name: IDUtils
site_description: Small library for validating and normalising persistent identifiers used in scholarly communication.
site_url: https://inveniosoftware.github.io/idutils
repo_url: https://github.com/inveniosoftware/idutils
repo_name: inveniosoftware/idutils

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

nav:
  - Home: index.md
  - API Reference: api.md
  - Custom Schemes: custom-schemes.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true
